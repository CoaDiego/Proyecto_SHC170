<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador eCampus - USFX</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            text-align: center; 
            padding-top: 50px; 
        }
        .moodle-box { 
            background: white; 
            width: 450px; 
            padding: 40px 30px; 
            margin: auto; 
            border-radius: 12px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            border-top: 6px solid #d35400; 
        }
        h2 { color: #2c3e50; margin-bottom: 5px; margin-top: 0; }
        p { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { font-weight: bold; font-size: 14px; color: #34495e; display: block; margin-bottom: 5px; }
        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #bdc3c7; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-family: inherit;
        }
        input[readonly] { background-color: #ecf0f1; color: #7f8c8d; }
        button { 
            background-color: #e67e22; 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            font-size: 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            margin-top: 15px; 
            transition: background-color 0.3s; 
        }
        button:hover { background-color: #d35400; }
        .usfx-badge { 
            background-color: #c0392b; 
            color: white; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: bold; 
            display: inline-block; 
            margin-bottom: 15px; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="moodle-box">
        <div class="usfx-badge">eCAMPUS USFX</div>
        <h2>Plataforma Virtual</h2>
        <p>Facultad de Ciencias Económicas y Empresariales</p>
        
        <form action="http://localhost:8000/lti/launch" method="POST">
            
            <div class="form-group">
                <label>Usuario Autenticado:</label>
                <input type="text" name="lis_person_name_full" value="Diego Armando Coa Veliz" readonly>
            </div>

            <div class="form-group">
                <label>Matrícula / ID Institucional:</label>
                <input type="text" name="user_id" value="USFX-2026-ADM" readonly>
            </div>

            <div class="form-group">
                <label>Simular Rol en Moodle:</label>
                <select name="roles">
                    <option value="Instructor">Docente (Instructor)</option>
                    <option value="Learner">Estudiante (Learner)</option>
                </select>
            </div>
            
            <button type="submit">Lanzar Herramienta LTI</button>
        </form>
    </div>

</body>
</html>

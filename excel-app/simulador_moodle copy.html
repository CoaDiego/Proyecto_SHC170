<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Moodle - USFX</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding-top: 50px; }
        .moodle-box { background: white; width: 400px; padding: 30px; margin: auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-top: 5px solid #ff9900; }
        button { background-color: #ff9900; color: white; border: none; padding: 15px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;}
        button:hover { background-color: #e68a00; }
    </style>
</head>
<body>

    <div class="moodle-box">
        <img src="https://moodle.org/theme/image.php/moodleorg/theme/1709600181/logo" alt="Moodle Logo" width="150" style="margin-bottom: 20px;">
        <h2>Campus Virtual</h2>
        <p>Curso: Estadística Empresarial</p>
        <p>Usuario autenticado: <strong>Diego Armando Coa Veliz</strong></p>
        
        <!-- Este formulario hace exactamente lo que haría LTI 1.1 -->
        <form action="http://localhost:8000/lti/launch" method="POST">
            <!-- Datos ocultos que viajan al Backend -->
            <input type="hidden" name="user_id" value="USFX-SIS-001">
            <input type="hidden" name="lis_person_name_full" value="Diego Armando Coa Veliz">
            <input type="hidden" name="roles" value="Instructor">
            
            <button type="submit">Ingresar al Software Estadístico</button>
        </form>
    </div>

</body>
</html>
